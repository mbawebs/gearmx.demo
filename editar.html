<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar anuncio | Gear México</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="top-ad">
    ANUNCIA TU NEGOCIO AQUÍ · Luthiers · Tiendas · Clases · Gear
  </div>

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1>
          <a href="index.html" class="logo-link">
            <span>Gear</span> México
          </a>
        </h1>
        <p>Edita, marca vendido u oculta tu anuncio</p>
      </div>

      <a href="index.html" class="post-btn">Volver al inicio</a>
    </div>
  </header>

  <main class="container">
    <section class="publish-box">
      <h2>Editar anuncio</h2>

      <p id="editStatus" class="publish-text">
        Cargando anuncio...
      </p>

      <form class="publish-form" id="editForm" style="display:none;">

        <div class="form-group">
          <label>Título del anuncio</label>
          <input id="title" type="text" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Precio</label>
            <input id="price" type="number" required>
          </div>

          <div class="form-group">
            <label>Categoría</label>
            <select id="category" required>
              <option value="Guitarras">Guitarras</option>
              <option value="Bajos">Bajos</option>
              <option value="Amplificadores">Amplificadores</option>
              <option value="Pedales">Pedales</option>
              <option value="Partes">Partes</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Ubicación</label>
          <input id="city" type="text" required>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea id="description" required></textarea>
        </div>

        <div class="form-group">
          <label>Tu nombre o contacto</label>
          <input id="contactName" type="text" required>
        </div>

        <div class="form-group">
          <label>Link de contacto</label>
          <input id="contactLink" type="url" required>
        </div>

        <div class="form-group">
          <label>Estado del anuncio</label>
          <select id="status" required>
            <option value="active">Activo</option>
            <option value="sold">Vendido</option>
            <option value="hidden">Oculto</option>
          </select>
        </div>

        <button type="submit" class="publish-submit" id="saveBtn">
          Guardar cambios
        </button>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button type="button" class="publish-submit" id="soldBtn" style="background:#444; flex:1;">
            Marcar como vendido
          </button>

          <button type="button" class="publish-submit" id="activeBtn" style="background:#5B2A86; flex:1;">
            Reactivar anuncio
          </button>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button type="button" class="publish-submit" id="hideBtn" style="background:#b26a00; flex:1;">
            Ocultar anuncio
          </button>

          <button type="button" class="publish-submit" id="deleteBtn" style="background:#b00020; flex:1;">
            Eliminar definitivamente
          </button>
        </div>

        <p id="formMessage" class="publish-text"></p>

      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://rznofcaveoneeixyulxy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Qdj2WyKAkw-pDOQUwHTCbQ_tNwwWPVC";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const listingId = params.get("id");
    const editToken = params.get("token");

    const editStatus = document.getElementById("editStatus");
    const editForm = document.getElementById("editForm");
    const formMessage = document.getElementById("formMessage");

    const saveBtn = document.getElementById("saveBtn");
    const soldBtn = document.getElementById("soldBtn");
    const activeBtn = document.getElementById("activeBtn");
    const hideBtn = document.getElementById("hideBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    async function loadListing() {
      if (!listingId || !editToken) {
        editStatus.textContent = "❌ Link inválido. Falta id o token.";
        return;
      }

      const { data, error } = await supabaseClient
        .from("listings")
        .select("*")
        .eq("id", listingId)
        .eq("edit_token", editToken)
        .single();

      if (error || !data) {
        editStatus.textContent = "❌ No se encontró el anuncio o el link secreto no es válido.";
        return;
      }

      if (data.status === "deleted") {
        editStatus.textContent = "❌ Este anuncio fue eliminado.";
        return;
      }

      document.getElementById("title").value = data.title || "";
      document.getElementById("price").value = data.price || "";
      document.getElementById("category").value = data.category || "Guitarras";
      document.getElementById("city").value = data.city || "";
      document.getElementById("description").value = data.description || "";
      document.getElementById("contactName").value = data.contact_name || "";
      document.getElementById("contactLink").value = data.contact_link || "";
      document.getElementById("status").value = data.status || "active";

      editStatus.textContent = "✅ Anuncio cargado. Ya puedes editarlo.";
      editForm.style.display = "flex";
    }

    async function updateListing(updates, successMessage) {
      formMessage.textContent = "";

      const { error } = await supabaseClient
        .from("listings")
        .update(updates)
        .eq("id", listingId)
        .eq("edit_token", editToken);

      if (error) {
        throw error;
      }

      if (updates.status) {
        document.getElementById("status").value = updates.status;
      }

      formMessage.innerHTML = `
        ✅ ${successMessage}
        <br><br>
        <a class="post-btn" href="anuncio.html?id=${listingId}">
          Ver anuncio
        </a>
        <a class="post-btn" href="index.html" style="margin-left:8px;">
          Volver al inicio
        </a>
      `;
    }

    editForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      saveBtn.disabled = true;
      saveBtn.textContent = "Guardando...";

      try {
        const updates = {
          title: document.getElementById("title").value.trim(),
          price: Number(document.getElementById("price").value),
          city: document.getElementById("city").value.trim(),
          category: document.getElementById("category").value,
          description: document.getElementById("description").value.trim(),
          contact_name: document.getElementById("contactName").value.trim(),
          contact_link: document.getElementById("contactLink").value.trim(),
          status: document.getElementById("status").value
        };

        await updateListing(updates, "Cambios guardados correctamente.");

        saveBtn.textContent = "Guardar cambios";
        saveBtn.disabled = false;

      } catch (error) {
        console.error(error);
        formMessage.textContent = "❌ Error: " + error.message;
        saveBtn.textContent = "Guardar cambios";
        saveBtn.disabled = false;
      }
    });

    soldBtn.addEventListener("click", async function () {
      if (!confirm("¿Marcar este anuncio como vendido? Seguirá visible, pero aparecerá como VENDIDO.")) return;

      soldBtn.disabled = true;
      soldBtn.textContent = "Marcando...";

      try {
        await updateListing({ status: "sold" }, "Anuncio marcado como vendido.");
      } catch (error) {
        formMessage.textContent = "❌ Error: " + error.message;
      }

      soldBtn.textContent = "Marcar como vendido";
      soldBtn.disabled = false;
    });

    activeBtn.addEventListener("click", async function () {
      if (!confirm("¿Reactivar este anuncio? Volverá a aparecer como disponible.")) return;

      activeBtn.disabled = true;
      activeBtn.textContent = "Reactivando...";

      try {
        await updateListing({ status: "active" }, "Anuncio reactivado correctamente.");
      } catch (error) {
        formMessage.textContent = "❌ Error: " + error.message;
      }

      activeBtn.textContent = "Reactivar anuncio";
      activeBtn.disabled = false;
    });

    hideBtn.addEventListener("click", async function () {
      if (!confirm("¿Ocultar este anuncio? Ya no aparecerá en Gear México.")) return;

      hideBtn.disabled = true;
      hideBtn.textContent = "Ocultando...";

      try {
        await updateListing({ status: "hidden" }, "Anuncio ocultado correctamente.");
      } catch (error) {
        formMessage.textContent = "❌ Error: " + error.message;
      }

      hideBtn.textContent = "Ocultar anuncio";
      hideBtn.disabled = false;
    });

    deleteBtn.addEventListener("click", async function () {
      if (!confirm("¿Seguro que quieres eliminar definitivamente este anuncio? Esta acción no se puede deshacer.")) return;
      if (!confirm("Última confirmación: ¿eliminar para siempre este anuncio?")) return;

      deleteBtn.disabled = true;
      deleteBtn.textContent = "Eliminando...";

      try {
        await updateListing({ status: "deleted" }, "Anuncio eliminado definitivamente.");

        editForm.style.display = "none";
        editStatus.textContent = "✅ Anuncio eliminado definitivamente.";

        formMessage.innerHTML = `
          <a class="post-btn" href="index.html">Volver al inicio</a>
        `;
      } catch (error) {
        formMessage.textContent = "❌ Error: " + error.message;
        deleteBtn.textContent = "Eliminar definitivamente";
        deleteBtn.disabled = false;
      }
    });

    loadListing();
  </script>

</body>
</html>
