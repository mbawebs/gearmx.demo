<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar anuncio | Gear México</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-ad">
    ANUNCIA TU NEGOCIO AQUÍ · Luthiers · Tiendas · Clases · Gear
  </div>

  <header class="site-header">
    <div class="container header-inner">

      <div>
        <h1>
          <a href="index.html" class="logo-link">
            <h1>
  <a href="index.html" class="logo-link">
    <span>Gear</span> México
  </a>
</h1>
          </a>
        </h1>

        <p>Publica tu gear musical en México</p>
      </div>

      <a href="index.html" class="post-btn">
        Volver al inicio
      </a>

    </div>
  </header>

  <main class="container">

    <section class="publish-box">

      <h2>Publicar anuncio</h2>

      <p class="publish-text">
        Estamos preparando la versión donde podrás publicar directamente.
        Por ahora este formulario funciona como demostración visual.
      </p>

      <form class="publish-form">

        <div class="form-group">
          <label>Título del anuncio</label>
          <input
            type="text"
            placeholder="Ej. Charvel Fusion Special MIJ 1990"
          >
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>Precio</label>
            <input
              type="number"
              placeholder="22000"
            >
          </div>

          <div class="form-group">
            <label>Categoría</label>

            <select>
              <option>Guitarras</option>
              <option>Bajos</option>
              <option>Amplificadores</option>
              <option>Pedales</option>
              <option>Partes</option>
            </select>
          </div>

        </div>

        <div class="form-group">
          <label>Ubicación</label>

          <input
            type="text"
            placeholder="Monterrey, Nuevo León"
          >
        </div>

        <div class="form-group">
          <label>Descripción</label>

          <textarea
            placeholder="Describe condición, modificaciones, detalles importantes..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Fotos</label>

          <input
            type="file"
            multiple
            accept="image/*"
          >
        </div>

        <div class="form-group">
          <label>Facebook / Marketplace / Instagram / WhatsApp</label>

          <input
            type="text"
            placeholder="https://..."
          >
        </div>

        <button
          type="button"
          class="publish-submit"
        >
          Publicar anuncio
        </button>

      </form>

    </section>

  </main>

</body>
</html>
