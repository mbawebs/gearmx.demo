<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gear Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container">
      <h1>Gear Marketplace</h1>
      <p>Gear usado en México. Busca, publica y contacta directo.</p>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <input id="searchInput" type="text" placeholder="Buscar Charvel, Ibanez, Marshall..." class="search-box">

      <div class="filters">
        <select id="categoryFilter">
          <option value="">Todas las categorías</option>
          <option value="Guitarras">Guitarras</option>
          <option value="Bajos">Bajos</option>
          <option value="Amplificadores">Amplificadores</option>
          <option value="Pedales">Pedales</option>
          <option value="Partes">Partes</option>
        </select>

        <select id="stateFilter">
          <option value="">Todos los estados</option>
          <option value="Nuevo León">Nuevo León</option>
          <option value="Jalisco">Jalisco</option>
          <option value="CDMX">CDMX</option>
          <option value="Coahuila">Coahuila</option>
          <option value="Puebla">Puebla</option>
        </select>

        <button id="searchBtn">Buscar</button>
      </div>
    </div>
  </section>

  <main class="container">
    <div id="listingsGrid" class="listings"></div>
  </main>

  <section class="warning">
    <div class="container">
      <h2>⚠️ Compra con precaución</h2>
      <p>Investiga al vendedor antes de realizar cualquier compra.</p>
      <p>Gear Marketplace solo muestra anuncios y no participa en pagos, envíos, apartados, garantías ni entregas.</p>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
